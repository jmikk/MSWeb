<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Kart Leaderboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for browser-side JSX transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        body {
            background-color: #0d0d1a;
        }
        .shimmer-bg {
            animation: shimmer 3s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in a browser environment
        const Icon = ({ name, className = "", fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ fill: fill }}></i>;
        };

        const INITIAL_RACERS = [
            { id: 1, name: 'Mario', image: 'https://mario.wiki.gallery/images/d/d9/MK8_Mario_Icon.png', color: 'bg-red-600' },
            { id: 2, name: 'Luigi', image: 'https://mario.wiki.gallery/images/5/51/MK8_Luigi_Icon.png', color: 'bg-green-600' },
            { id: 3, name: 'Peach', image: 'https://mario.wiki.gallery/images/c/c2/MK8_Peach_Icon.png', color: 'bg-pink-400' },
            { id: 4, name: 'Yoshi', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsp4kAo0OyAcfp6k13S-vnhVOnH93KiREndg&s', color: 'bg-green-500' },
            { id: 5, name: 'Toad', image: 'https://sonoranimages.wordpress.com/wp-content/uploads/2016/07/92a7225-copy2.jpg', color: 'bg-blue-500' },
            { id: 6, name: 'Bowser', image: 'https://i.ebayimg.com/images/g/120AAOSwrCFdckJe/s-l1200.jpg', color: 'bg-orange-700' },
            { id: 7, name: 'Donkey Kong', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRfxk8os200XL3jD1nbobT3jzikRAJMUJkHXw&s', color: 'bg-amber-900' },
            { id: 8, name: 'Wario', image: 'https://mario.wiki.gallery/images/c/c2/MK8_Wario_Icon.png', color: 'bg-yellow-500' },
            { id: 9, name: 'Waluigi', image: 'https://mario.wiki.gallery/images/7/78/MK8_Waluigi_Icon.png', color: 'bg-indigo-900' },
            { id: 10, name: 'Rosalina', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFop4IBhyNoD2zFRXK-MB9TusQZsf3Ty1Fjw&s', color: 'bg-cyan-400' },
        ];

        const ITEMS = [
            { name: 'Green Shell', color: 'border-green-500', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMGJn_QXrmQIoiIu0jxwFxpDTo0d4t4rDcwA&s' },
            { name: 'Red Shell', color: 'border-red-500', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1YPeBgQ4ehOgWYeGOR0J0aw03hMdORWnl8g&s' },
            { name: 'Blue Shell', color: 'border-blue-600', img: 'https://upload.wikimedia.org/wikipedia/en/6/60/Mario_Kart_Blue_Shell.png' },
            { name: 'Banana', color: 'border-yellow-400', img: 'https://img.favpng.com/1/6/19/banana-mario-kart-double-dash-super-mario-64-ds-gamecube-png-favpng-kGCUywg8Si9gseqqiYyECZqdL.jpg' },
            { name: 'Mushroom', color: 'border-red-400', img: 'https://coumatous.wordpress.com/wp-content/uploads/2017/04/mushroom_cup.png' }
        ];

        const ITEM_BOX_IMG = "https://static.wikia.nocookie.net/mariokart/images/5/5b/Item_Box_-_Mario_Kart_Wii.png/revision/latest/scale-to-width-down/1200?cb=20190615011700";

        function App() {
            const [racers, setRacers] = useState(INITIAL_RACERS);
            const [isSpinning, setIsSpinning] = useState(false);
            const [currentItem, setCurrentItem] = useState(null);
            const [activeRacerIndex, setActiveRacerIndex] = useState(0);
            const [log, setLog] = useState("Race Day! Select a driver and hit the Item Box!");

            const handleImageError = (e) => {
                e.target.style.display = 'none';
                e.target.parentNode.classList.add('flex', 'items-center', 'justify-center', 'bg-slate-800');
                e.target.parentNode.innerHTML += '<span class="text-xl font-bold text-white/20">?</span>';
            };

            const triggerItemEffect = (item) => {
                let newRacers = [...racers];
                let userIdx = activeRacerIndex;
                const userName = newRacers[userIdx].name;

                if (item.name === 'Green Shell') {
                    const targets = newRacers.map((_, i) => i).filter(i => i < newRacers.length - 1);
                    const targetIdx = targets[Math.floor(Math.random() * targets.length)];
                    const targetName = newRacers[targetIdx].name;
                    const temp = newRacers[targetIdx];
                    newRacers[targetIdx] = newRacers[targetIdx + 1];
                    newRacers[targetIdx + 1] = temp;
                    setLog(`${userName} launched a Green Shell! ${targetName} tumbled!`);
                } 
                else if (item.name === 'Red Shell') {
                    if (userIdx > 0) {
                        const targetName = newRacers[userIdx - 1].name;
                        const temp = newRacers[userIdx - 1];
                        newRacers[userIdx - 1] = newRacers[userIdx];
                        newRacers[userIdx] = temp;
                        setActiveRacerIndex(userIdx - 1);
                        setLog(`${userName}'s Red Shell hit ${targetName}!`);
                    } else {
                        setLog(`${userName} is in 1st! The Red Shell flew off course.`);
                    }
                } 
                else if (item.name === 'Blue Shell') {
                    const firstPlace = newRacers[0];
                    const rest = newRacers.slice(1);
                    newRacers = [...rest, firstPlace];
                    if (userIdx === 0) setActiveRacerIndex(newRacers.length - 1);
                    else setActiveRacerIndex(userIdx - 1);
                    setLog(`BLUE SHELL! ${firstPlace.name} was sent to the back!`);
                }
                else if (item.name === 'Mushroom') {
                    if (userIdx > 0) {
                        const temp = newRacers[userIdx - 1];
                        newRacers[userIdx - 1] = newRacers[userIdx];
                        newRacers[userIdx] = temp;
                        setActiveRacerIndex(userIdx - 1);
                        setLog(`${userName} used a Mushroom to boost!`);
                    } else {
                        setLog(`${userName} is already in 1st place!`);
                    }
                }
                else if (item.name === 'Banana') {
                    const potentialTargets = [];
                    for (let i = userIdx + 1; i < newRacers.length - 1; i++) potentialTargets.push(i);
                    if (potentialTargets.length > 0) {
                        const targetIdx = potentialTargets[Math.floor(Math.random() * potentialTargets.length)];
                        const targetName = newRacers[targetIdx].name;
                        const temp = newRacers[targetIdx];
                        newRacers[targetIdx] = newRacers[targetIdx + 1];
                        newRacers[targetIdx + 1] = temp;
                        setLog(`${userName} dropped a Banana! ${targetName} slipped!`);
                    } else {
                        setLog(`${userName} dropped a Banana, but no one was behind them.`);
                    }
                }
                setRacers(newRacers);
            };

            const handleDrawItem = () => {
                if (isSpinning) return;
                setIsSpinning(true);
                setCurrentItem(null);
                let iterations = 0;
                const interval = setInterval(() => {
                    setCurrentItem(ITEMS[Math.floor(Math.random() * ITEMS.length)]);
                    iterations++;
                    if (iterations >= 15) {
                        clearInterval(interval);
                        const finalItem = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                        setCurrentItem(finalItem);
                        setIsSpinning(false);
                        setTimeout(() => triggerItemEffect(finalItem), 600);
                    }
                }, 80);
            };

            const BigRankBadge = ({ index }) => {
                const pos = index + 1;
                let colorClass = "bg-blue-600 border-blue-400";
                let textColor = "text-white";
                let iconName = null;

                if (pos === 1) {
                    colorClass = "bg-gradient-to-b from-yellow-300 to-yellow-500 border-yellow-200";
                    textColor = "text-yellow-900";
                    iconName = "crown";
                } else if (pos === 2) {
                    colorClass = "bg-gradient-to-b from-slate-200 to-slate-400 border-white";
                    textColor = "text-slate-800";
                } else if (pos === 3) {
                    colorClass = "bg-gradient-to-b from-orange-400 to-orange-700 border-orange-300";
                    textColor = "text-orange-950";
                }

                return (
                    <div className={`relative flex flex-col items-center justify-center w-16 h-16 rounded-full border-4 shadow-[0_4px_0_rgba(0,0,0,0.3)] ${colorClass} transform -rotate-12`}>
                        {iconName && <Icon name={iconName} className="w-4 h-4 mb-[-4px] drop-shadow-sm" fill="currentColor" />}
                        <span className={`text-3xl font-black italic ${textColor} leading-none tracking-tighter drop-shadow-sm`}>
                            {pos}
                        </span>
                        <span className={`text-[10px] font-black uppercase italic ${textColor} opacity-80 leading-none`}>
                            {pos === 1 ? 'st' : pos === 2 ? 'nd' : pos === 3 ? 'rd' : 'th'}
                        </span>
                    </div>
                );
            };

            const getPositionOfCharacter = (racerId) => {
                return racers.findIndex(r => r.id === racerId) + 1;
            };

            return (
                <div className="min-h-screen bg-[#0d0d1a] text-white p-4 font-sans flex flex-col items-center">
                    <div className="text-center mb-8">
                        <h1 className="text-4xl md:text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-orange-500 uppercase drop-shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
                            Mario Kart Standings
                        </h1>
                        <div className="h-1.5 w-64 mx-auto bg-blue-600 rounded-full mt-2 shadow-[0_0_15px_rgba(37,99,235,0.4)]"></div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 w-full max-w-6xl">
                        <div className="flex flex-col gap-6">
                            <div className="bg-[#1a1a2e] p-6 rounded-3xl border-4 border-[#252545] shadow-2xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-black italic flex items-center gap-2 text-yellow-400 uppercase tracking-tight">
                                        <Icon name="zap" className="w-5 h-5" fill="currentColor" /> Select Driver
                                    </h2>
                                    <button 
                                        onClick={() => { setRacers([...INITIAL_RACERS]); setLog("Grand Prix Reset!"); setCurrentItem(null); setActiveRacerIndex(0); }}
                                        className="text-[10px] font-black uppercase text-red-400 hover:text-red-300 transition-colors flex items-center gap-1"
                                    >
                                        <Icon name="rotate-ccw" className="w-3 h-3" /> Reset
                                    </button>
                                </div>
                                
                                <div className="grid grid-cols-5 gap-2 mb-6">
                                    {INITIAL_RACERS.map((r) => {
                                        const currentPos = getPositionOfCharacter(r.id);
                                        const isActive = racers[activeRacerIndex].id === r.id;
                                        return (
                                            <button
                                                key={r.id}
                                                onClick={() => setActiveRacerIndex(racers.findIndex(rac => rac.id === r.id))}
                                                className={`aspect-square rounded-xl overflow-hidden border-2 transition-all flex items-center justify-center p-1 relative ${
                                                    isActive ? 'border-yellow-400 scale-110 ring-4 ring-yellow-400/30 bg-slate-700 shadow-lg z-20' : 'border-white/10 opacity-60 hover:opacity-100 bg-[#0d0d1a]'
                                                }`}
                                            >
                                                <div className={`absolute -top-1 -right-1 w-6 h-6 flex items-center justify-center text-[11px] font-black rounded-full border-2 shadow-lg z-10 ${
                                                    currentPos === 1 ? 'bg-yellow-400 text-black border-yellow-200' : 
                                                    currentPos === 2 ? 'bg-slate-300 text-black border-white' : 
                                                    currentPos === 3 ? 'bg-orange-600 text-white border-orange-400' : 'bg-blue-600 text-white border-blue-400'
                                                }`}>
                                                    {currentPos}
                                                </div>
                                                <img src={r.image} alt={r.name} onError={handleImageError} className="w-full h-full object-cover" />
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="relative pt-4 pb-2">
                                    <div onClick={handleDrawItem} className={`aspect-square w-full max-w-[240px] mx-auto rounded-[2.5rem] border-[10px] cursor-pointer transition-all flex flex-col items-center justify-center bg-[#16213e] overflow-hidden relative shadow-2xl ${isSpinning ? 'animate-pulse' : 'hover:scale-[1.02] active:scale-95'} ${currentItem ? currentItem.color : 'border-blue-500 shadow-blue-500/20'}`}>
                                        {!currentItem && !isSpinning && <div className="absolute inset-0 opacity-10 flex items-center justify-center"><span className="text-[12rem] font-black">?</span></div>}
                                        
                                        {isSpinning ? (
                                            <div className="flex flex-col items-center">
                                                <img src={ITEM_BOX_IMG} className="w-28 h-28 animate-[spin_1s_linear_infinite] mb-2" alt="Box" />
                                                <span className="text-2xl font-black italic text-blue-400">ROLLING</span>
                                            </div>
                                        ) : currentItem ? (
                                            <div className="flex flex-col items-center p-4 text-center">
                                                <img src={currentItem.img} alt={currentItem.name} className="w-28 h-28 object-contain mb-2 drop-shadow-xl" />
                                                <div className="font-black text-2xl uppercase italic text-white drop-shadow-lg">{currentItem.name}</div>
                                            </div>
                                        ) : (
                                            <div className="text-center p-4 flex flex-col items-center justify-center h-full pt-2">
                                                <img src={ITEM_BOX_IMG} className="w-28 h-28 mb-4 animate-bounce mx-auto" alt="Box" />
                                                <span className="font-black text-blue-400 uppercase tracking-widest text-xl italic">GET ITEM</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="mt-6 bg-black/60 p-4 rounded-2xl border border-white/5 italic text-sm text-center min-h-[72px] flex items-center justify-center text-blue-200 font-medium leading-tight">
                                    {log}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-2 bg-[#1a1a2e] rounded-3xl border-4 border-[#252545] shadow-2xl overflow-hidden">
                            <div className="p-6 bg-[#252545] flex justify-between items-center border-b-4 border-black/20">
                                <h2 className="text-2xl font-black italic uppercase tracking-tighter">Standings</h2>
                                <div className="flex items-center gap-2 bg-red-600/20 px-3 py-1 rounded-full border border-red-500/30">
                                    <span className="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-red-400">Race Live</span>
                                </div>
                            </div>

                            <div className="p-4 flex flex-col gap-3 bg-gradient-to-b from-[#1a1a2e] to-[#0d0d1a]">
                                {racers.map((racer, index) => (
                                    <div key={racer.id} className={`flex items-center gap-6 p-4 rounded-2xl transition-all duration-500 border-2 ${activeRacerIndex === index ? 'bg-blue-600/10 border-blue-500 shadow-[0_0_30px_rgba(37,99,235,0.2)]' : 'bg-[#252545]/40 border-transparent'}`}>
                                        <BigRankBadge index={index} />

                                        <div className={`w-20 h-20 rounded-2xl overflow-hidden border-4 border-white/10 shadow-xl relative group ${racer.color}`}>
                                            <img src={racer.image} alt={racer.name} onError={handleImageError} className="w-full h-full object-cover transform group-hover:scale-110 transition-transform" />
                                        </div>

                                        <div className="flex-1">
                                            <div className="flex justify-between items-end mb-1">
                                                <span className="font-black italic uppercase text-2xl tracking-tighter text-white flex items-center gap-2">
                                                    {racer.name}
                                                    {activeRacerIndex === index && <span className="text-[12px] bg-yellow-400 text-black px-2 py-0.5 rounded-md italic font-black shadow-sm">PLAYER</span>}
                                                </span>
                                            </div>
                                            <div className="h-4 bg-black/60 rounded-full overflow-hidden border-2 border-white/5 relative">
                                                <div className={`h-full rounded-full transition-all duration-1000 ${racer.color} relative`} style={{ width: `${100 - (index * 9)}%` }}>
                                                    <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent w-full -translate-x-full shimmer-bg"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
