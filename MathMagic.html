<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Mind Reader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 2px solid #3498db; border-radius: 10px; padding: 10px; cursor: pointer; transition: 0.3s; background: #fff; }
        .card.selected { background-color: #3498db; color: white; transform: translateY(-5px); }
        .card h3 { margin-top: 0; border-bottom: 1px solid #ddd; }
        .numbers-grid { font-size: 0.9em; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { margin-top: 30px; padding: 12px 25px; font-size: 1.1em; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #27ae60; }
        #result { margin-top: 20px; font-size: 1.5em; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>Binary Mind Reader</h1>
    <p>Think of a number between <b>1 and 63</b>.<br>Select every card that contains your number, then click the button!</p>
    
    <div class="grid" id="cardContainer"></div>

    <button onclick="guessNumber()">Reveal My Number!</button>
    <div id="result"></div>
</div>

<script>
    const cardContainer = document.getElementById('cardContainer');
    const powers = [1, 2, 4, 8, 16, 32];

    // Generate the cards
    powers.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.value = p;
        card.onclick = () => card.classList.toggle('selected');

        let title = document.createElement('h3');
        title.innerText = "Card ";
        card.appendChild(title);

        let numGrid = document.createElement('div');
        numGrid.className = 'numbers-grid';

        // Fill card with numbers that have the p-bit set
        for (let i = 1; i <= 63; i++) {
            if ((i & p) === p) {
                let span = document.createElement('span');
                span.innerText = i;
                numGrid.appendChild(span);
            }
        }

        card.appendChild(numGrid);
        cardContainer.appendChild(card);
    });

    function guessNumber() {
        let total = 0;
        document.querySelectorAll('.card.selected').forEach(card => {
            total += parseInt(card.dataset.value);
        });

        const resultDiv = document.getElementById('result');
        if (total === 0) {
            resultDiv.innerText = "You didn't select any cards! Is your number 0?";
        } else {
            resultDiv.innerHTML = `Your number is... <span style="color:#e74c3c; font-size:1.5em;">${total}</span>! 🧙‍♂️`;
        }
    }
</script>

</body>
</html>
