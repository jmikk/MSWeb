<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Jeopardy Game</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#060ce9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVG Icons to avoid external library loading issues
        const Icons = {
            Trophy: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 22V18" /><path d="M14 22V18" /><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z" />
                </svg>
            ),
            Users: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
            ),
            RotateCcw: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
                </svg>
            ),
            Check: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            ),
            X: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            ),
            Eye: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" />
                </svg>
            ),
            Calculator: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" />
                </svg>
            )
        };

        const categories = [
            {
                name: "Adding Fractions",
                questions: [
                    { points: 100, q: "Calculate: 1/5 + 2/5", a: "3/5" },
                    { points: 200, q: "Solve and simplify: 1/4 + 1/2", a: "3/4" },
                    { points: 300, q: "Find the sum: 2/3 + 1/4", a: "11/12" },
                    { points: 400, q: "Calculate: 2 1/2 + 1 3/4", a: "4 1/4" },
                    { points: 500, q: "Solve: 5/6 + 3/8 + 1/3", a: "37/24 or 1 13/24" }
                ]
            },
            {
                name: "Missing Angles",
                questions: [
                    { points: 100, q: "Two angles form a straight line. If one is 110°, what is the other?", a: "70°" },
                    { points: 200, q: "In a right triangle, one acute angle is 30°. What is the third angle?", a: "60°" },
                    { points: 300, q: "Find the missing angle in a triangle with angles of 45° and 55°.", a: "80°" },
                    { points: 400, q: "Two angles are complementary. If one is x and the other is 2x, find x.", a: "30°" },
                    { points: 500, q: "What is the measure of each interior angle in a regular pentagon?", a: "108°" }
                ]
            },
            {
                name: "One Step Equations",
                questions: [
                    { points: 100, q: "Solve for x: x + 7 = 15", a: "x = 8" },
                    { points: 200, q: "Solve for y: y - 12 = 20", a: "y = 32" },
                    { points: 300, q: "Solve for m: 4m = 36", a: "m = 9" },
                    { points: 400, q: "Solve for z: z / 5 = 11", a: "z = 55" },
                    { points: 500, q: "Solve for w: -9w = 81", a: "w = -9" }
                ]
            },
            {
                name: "Two Step Equations",
                questions: [
                    { points: 100, q: "Solve: 2x + 5 = 15", a: "x = 5" },
                    { points: 200, q: "Solve: 3y - 4 = 11", a: "y = 5" },
                    { points: 300, q: "Solve: m/2 + 8 = 12", a: "m = 8" },
                    { points: 400, q: "Solve: 10 - 2z = 4", a: "z = 3" },
                    { points: 500, q: "Solve: -5w + 13 = -12", a: "w = 5" }
                ]
            },
            {
                name: "Fractions Galore!",
                questions: [
                    { points: 100, q: "Subtract and simplify: 3/4 - 1/4", a: "1/2" },
                    { points: 200, q: "Multiply: 2/3 × 3/5", a: "2/5" },
                    { points: 300, q: "Divide: 1/2 ÷ 1/4", a: "2" },
                    { points: 400, q: "Multiply: 1 1/2 × 2 2/3", a: "4" },
                    { points: 500, q: "Simplify: (1/2 + 1/3) ÷ 5/6", a: "1" }
                ]
            }
        ];

        function App() {
            const [teams, setTeams] = useState([
                { name: "Team 1", score: 0 },
                { name: "Team 2", score: 0 }
            ]);
            const [activeQuestion, setActiveQuestion] = useState(null);
            const [completed, setCompleted] = useState(new Set());
            const [showAnswer, setShowAnswer] = useState(false);
            const [numTeams, setNumTeams] = useState(2);

            useEffect(() => {
                setTeams(prev => {
                    const newTeams = [...prev];
                    if (numTeams > prev.length) {
                        for (let i = prev.length; i < numTeams; i++) {
                            newTeams.push({ name: `Team ${i + 1}`, score: 0 });
                        }
                    } else {
                        return newTeams.slice(0, numTeams);
                    }
                    return newTeams;
                });
            }, [numTeams]);

            const handleSelectQuestion = (catIdx, qIdx) => {
                const id = `${catIdx}-${qIdx}`;
                if (completed.has(id)) return;
                setActiveQuestion({ catIdx, qIdx, id, ...categories[catIdx].questions[qIdx] });
                setShowAnswer(false);
            };

            const handleScoreChange = (teamIdx, amount) => {
                setTeams(prev => prev.map((t, i) => i === teamIdx ? { ...t, score: t.score + amount } : t));
            };

            const closeQuestion = () => {
                setCompleted(prev => {
                    const next = new Set(prev);
                    next.add(activeQuestion.id);
                    return next;
                });
                setActiveQuestion(null);
            };

            const resetGame = () => {
                if (window.confirm("Are you sure you want to reset the game?")) {
                    setCompleted(new Set());
                    setTeams(teams.map(t => ({ ...t, score: 0 })));
                    setActiveQuestion(null);
                }
            };

            return (
                <div className="min-h-screen bg-[#060ce9] text-white font-sans p-4 md:p-8 select-none overflow-x-hidden">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-yellow-500 p-3 rounded-lg shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                <Icons.Trophy className="text-blue-900" size={32} />
                            </div>
                            <h1 className="text-4xl md:text-5xl font-black italic tracking-tighter uppercase text-yellow-400 drop-shadow-md">
                                MATH JEOPARDY
                            </h1>
                        </div>

                        <div className="flex items-center gap-4 bg-blue-800/50 p-2 rounded-xl border-2 border-blue-400">
                            <div className="flex items-center gap-2 px-3">
                                <Icons.Users size={20} className="text-blue-300" />
                                <select 
                                    value={numTeams} 
                                    onChange={(e) => setNumTeams(Number(e.target.value))}
                                    className="bg-transparent font-bold focus:outline-none cursor-pointer"
                                >
                                    {[2, 3, 4].map(n => <option key={n} value={n} className="text-black">{n} Teams</option>)}
                                </select>
                            </div>
                            <button 
                                onClick={resetGame}
                                className="flex items-center gap-2 bg-red-600 hover:bg-red-500 px-4 py-2 rounded-lg font-bold transition-colors"
                            >
                                <Icons.RotateCcw size={18} /> Reset
                            </button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto grid grid-cols-5 gap-2 md:gap-4 mb-12">
                        {categories.map((cat, catIdx) => (
                            <div key={catIdx} className="flex flex-col gap-2 md:gap-4">
                                <div className="bg-blue-800 border-b-4 border-yellow-500 h-24 md:h-28 flex items-center justify-center text-center p-2 rounded-t-xl shadow-lg">
                                    <span className="text-sm md:text-xl font-black uppercase tracking-tight leading-tight">
                                        {cat.name}
                                    </span>
                                </div>
                                {cat.questions.map((q, qIdx) => {
                                    const isDone = completed.has(`${catIdx}-${qIdx}`);
                                    return (
                                        <button
                                            key={qIdx}
                                            disabled={isDone}
                                            onClick={() => handleSelectQuestion(catIdx, qIdx)}
                                            className={`relative h-20 md:h-32 text-2xl md:text-5xl font-black rounded-lg transition-all transform active:scale-95 shadow-[0_8px_0px_0px_rgba(0,0,0,0.3)] border-2 border-blue-400 flex items-center justify-center
                                                ${isDone 
                                                ? 'bg-blue-950/50 text-blue-900 border-blue-900 opacity-50 cursor-not-allowed' 
                                                : 'bg-blue-700 hover:bg-yellow-500 hover:text-blue-900 text-yellow-400 hover:border-yellow-300 active:translate-y-1 active:shadow-none'}`}
                                        >
                                            {!isDone && q.points}
                                        </button>
                                    );
                                })}
                            </div>
                        ))}
                    </div>

                    <div className="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                        {teams.map((team, idx) => (
                            <div key={idx} className="bg-blue-800 border-4 border-blue-400 p-4 rounded-2xl flex flex-col items-center shadow-2xl">
                                <input 
                                    type="text" 
                                    value={team.name} 
                                    onChange={(e) => {
                                        const newTeams = [...teams];
                                        newTeams[idx].name = e.target.value;
                                        setTeams(newTeams);
                                    }}
                                    className="bg-transparent text-center text-xl font-black uppercase border-b-2 border-blue-600 mb-4 w-full focus:outline-none focus:border-yellow-500"
                                />
                                <div className="text-5xl font-mono text-yellow-400 mb-4 tabular-nums">
                                    {team.score}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => handleScoreChange(idx, -100)} className="bg-red-900 hover:bg-red-700 w-10 h-10 rounded-full flex items-center justify-center font-bold">-</button>
                                    <button onClick={() => handleScoreChange(idx, 100)} className="bg-green-900 hover:bg-green-700 w-10 h-10 rounded-full flex items-center justify-center font-bold">+</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {activeQuestion && (
                        <div className="fixed inset-0 bg-blue-950/95 flex items-center justify-center p-4 md:p-10 z-50">
                            <div className="bg-blue-800 border-[10px] border-yellow-600 p-8 md:p-16 rounded-3xl max-w-5xl w-full text-center space-y-10 shadow-[0_0_80px_rgba(234,179,8,0.4)] relative overflow-hidden animate-pop">
                                <div className="space-y-2">
                                    <p className="text-yellow-500 font-black tracking-[0.2em] text-xl md:text-2xl uppercase italic">
                                        {categories[activeQuestion.catIdx].name} • {activeQuestion.points}
                                    </p>
                                    <div className="h-1 w-32 bg-yellow-600 mx-auto rounded-full" />
                                </div>

                                <div className="min-h-[200px] flex items-center justify-center">
                                    <h2 className="text-4xl md:text-7xl font-black leading-tight drop-shadow-lg">
                                        {activeQuestion.q}
                                    </h2>
                                </div>

                                <div className="space-y-8">
                                    {showAnswer ? (
                                        <div className="space-y-8 animate-pop">
                                            <div className="inline-block bg-green-900/30 border-2 border-green-500 px-8 py-4 rounded-2xl">
                                                <p className="text-3xl md:text-5xl text-green-400 font-mono font-bold tracking-tight">
                                                    {activeQuestion.a}
                                                </p>
                                            </div>
                                            
                                            <div className="flex flex-col gap-4">
                                                <p className="text-blue-300 font-bold uppercase tracking-widest text-sm">Award Points to:</p>
                                                <div className="flex flex-wrap justify-center gap-4">
                                                    {teams.map((team, idx) => (
                                                        <div key={idx} className="flex flex-col gap-2">
                                                            <button
                                                                onClick={() => {
                                                                    handleScoreChange(idx, activeQuestion.points);
                                                                    closeQuestion();
                                                                }}
                                                                className="bg-green-600 hover:bg-green-500 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-transform active:scale-95"
                                                            >
                                                                <Icons.Check size={18} /> {team.name} (+{activeQuestion.points})
                                                            </button>
                                                            <button
                                                                onClick={() => {
                                                                    handleScoreChange(idx, activeQuestion.points / 2);
                                                                    closeQuestion();
                                                                }}
                                                                className="bg-orange-600 hover:bg-orange-500 px-4 py-2 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition-transform active:scale-95"
                                                            >
                                                                <Icons.Calculator size={16} /> Half Pts (+{activeQuestion.points / 2})
                                                            </button>
                                                        </div>
                                                    ))}
                                                    <button 
                                                        onClick={closeQuestion} 
                                                        className="bg-gray-600 hover:bg-gray-500 px-6 py-3 rounded-xl font-bold h-fit self-start"
                                                    >
                                                        No One
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <button 
                                            onClick={() => setShowAnswer(true)}
                                            className="bg-yellow-500 text-blue-900 px-12 py-6 rounded-full font-black text-3xl hover:bg-yellow-400 transition-all shadow-[0_10px_0_0_#ca8a04] hover:shadow-[0_6px_0_0_#ca8a04] active:shadow-none active:translate-y-1"
                                        >
                                            <span className="flex items-center gap-3">
                                                <Icons.Eye size={32} /> SHOW ANSWER
                                            </span>
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
